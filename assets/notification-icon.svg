<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <!--
    Filled silhouette of the Aniseekr eye. Designed for Android status-bar
    icons: white pixels are the silhouette, transparent pixels disappear.
    Strokes are intentionally avoided so the mark stays legible at 24x24.

    Path A: almond shell with the iris cut out via the even-odd fill rule.
    Path B: pupil dot.
    Path C: four directional rays (rounded rectangles).
  -->
  <g fill="#FFFFFF" fill-rule="evenodd">
    <path d="M60 22 C 30 22, 8 60, 8 60 C 8 60, 30 98, 60 98 C 90 98, 112 60, 112 60 C 112 60, 90 22, 60 22 Z
             M60 36 a 24 24 0 1 0 0.0001 0 Z" />
  </g>
  <circle cx="60" cy="60" r="14" fill="#FFFFFF" />
  <g fill="#FFFFFF">
    <rect x="56" y="2"   width="8" height="14" rx="4" />
    <rect x="56" y="104" width="8" height="14" rx="4" />
    <rect x="2"   y="56" width="14" height="8" rx="4" />
    <rect x="104" y="56" width="14" height="8" rx="4" />
  </g>
</svg>
